name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install deps
        run: |
          cd backend
          uv venv
          uv pip install -r requirements.txt
          uv pip install pytest
      - name: Tests
        run: |
          cd backend
          .venv/bin/python -m pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: |
          cd frontend
          npm install
          npm run build
